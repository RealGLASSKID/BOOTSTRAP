<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>ADB Terminal</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

<style>
body {
  background: #000;
  color: #00ff00;
  font-family: "Courier New", monospace;
}

.terminal {
  max-width: 900px;
  height: 500px;
  overflow-y: auto;
}

.input-line {
  display: flex;
}

input {
  background: transparent;
  border: none;
  outline: none;
  color: #00ff00;
  width: 100%;
}

.progress {
  height: 10px;
  background: #111;
}

.progress-bar {
  background: #00ff00;
}
</style>
</head>

<body>

<div class="terminal" id="terminal">
  <div id="output"></div>

  <div class="input-line">
    <span>C:\Windows\device></span>
    <input type="text" id="cmd" autofocus>
  </div>
</div>

<script>
const output = document.getElementById("output");
const input = document.getElementById("cmd");

function print(text, delay = 20) {
  return new Promise(resolve => {
    let i = 0;
    function type() {
      if (i < text.length) {
        output.innerHTML += text.charAt(i);
        i++;
        setTimeout(type, delay);
      } else {
        output.innerHTML += "<br>";
        document.getElementById("terminal").scrollTop = output.scrollHeight;
        resolve();
      }
    }
    type();
  });
}

async function runCommand(cmd) {

  if (cmd === "connect to TECNO SPARK GO 2021") {
    await print("Connecting...");
    await print("[OK] Connected to TECNO SPARK GO 2021\n");
  }

  else if (cmd === "scan system") {
    await print("[SCAN] Checking devices...\n");

    output.innerHTML += `
    <div class="progress mb-2">
      <div class="progress-bar" id="bar" style="width:0%"></div>
    </div>
    `;

    let bar = document.getElementById("bar");

    let width = 0;
    let interval = setInterval(() => {
      width += 10;
      bar.style.width = width + "%";
      if (width >= 100) clearInterval(interval);
    }, 200);

    await new Promise(r => setTimeout(r, 2200));

    await print("[OK] System Integrity: PASS");
    await print("[OK] Encryption: ENABLED");
    await print("[OK] Near by Device...");
    await print("[OK]  TECNO SPARK Go 2021");
    await print("[OK] TECNO POP 7");
    await print("[OK] TECNO SPARK 10C");
    await print("[OK] itel P33 Plus");
  }

  else if (cmd === "phone info") {
    await print(`
[INFO] Device: TECNO SPARK GO 2021
[INFO] Model: KE5
[INFO] Android: 10 (Go Edition)
[INFO] CPU: Helio A20
[INFO] RAM: 2GB
[INFO] Storage: 32GB

[NETWORK]
IP: 10.171.195.110
MAC: A4-FC-77-6C-56-75

[SECURITY]
Password: ****** (Updated)
[BATTERY]
5000mAh | 19% | Temp: 32°C
`);
  }

  else if (cmd === "running apps") {
    await print(`
Running Apps:
- WhatsApp
- Sportybet
- Opay
- Gallary (system)
`);
  }

  else if (cmd === "clear") {
    output.innerHTML = "";
  }

  else {
    await print("Command not recognized...");
  }
}

input.addEventListener("keydown", function(e) {
  if (e.key === "Enter") {
    let cmd = input.value.trim();
    output.innerHTML += `<div>&gt; ${cmd}</div>`;
    runCommand(cmd);
    input.value = "";
  }
});

</script>
</body>
</html>
